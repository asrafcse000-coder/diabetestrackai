<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Diabetes Risk Assessment</h1>
            <p>Enter clinical data to predict the likelihood of diabetes.</p>
        </header>

        <form action="/predict" method="POST" id="predictionForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" name="age" step="1" min="1" max="120" required placeholder="e.g. 45">
                </div>

                <div class="form-group">
                    <label for="bmi">BMI</label>
                    <input type="number" name="bmi" step="0.01" min="10" max="60" required placeholder="e.g. 27.3">
                </div>

                <div class="form-group">
                    <label for="hba1c">HbA1c Level</label>
                    <input type="number" name="hba1c" step="0.1" min="3" max="15" required placeholder="e.g. 5.5">
                </div>

                <div class="form-group">
                    <label for="glucose">Blood Glucose Level</label>
                    <input type="number" name="glucose" step="1" min="50" max="400" required placeholder="e.g. 120">
                </div>

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select name="gender" required>
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="hypertension">Hypertension</label>
                    <select name="hypertension" required>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="heart_disease">Heart Disease</label>
                    <select name="heart_disease" required>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="smoking">Smoking History</label>
                    <select name="smoking" required>
                        <option value="never">Never</option>
                        <option value="former">Former</option>
                        <option value="current">Current</option>
                        <option value="not current">Not Current</option>
                        <option value="ever">Ever</option>
                        <option value="No Info">No Info</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn">Analyze Data</button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
